name: Check and build aggressive x64v2 on CNB

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      skip_debug_packages:
        description: "Skip linux-image-*-dbg packages (recommended; much smaller/faster)"
        required: true
        default: true
        type: boolean

permissions:
  actions: write
  contents: write

concurrency:
  group: cachyos-kernel-cnb-aggressive-v2
  cancel-in-progress: false

jobs:
  check-upstream:
    name: Check aggressive x64v2 release every 10 days
    runs-on: ubuntu-24.04
    outputs:
      build: ${{ steps.check.outputs.build }}
    steps:
      - name: Enforce the ten-day check interval
        id: cadence
        env:
          LAST_CHECK: ${{ vars.CNB_AGGRESSIVE_V2_LAST_CHECK }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] || [ -z "${LAST_CHECK}" ]; then
            echo "due=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          last_epoch="$(date --date="${LAST_CHECK}" +%s)"
          now_epoch="$(date -u +%s)"
          if [ $((now_epoch - last_epoch)) -lt 864000 ]; then
            echo "due=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "due=true" >> "${GITHUB_OUTPUT}"

      - name: Check the newest CachyOS RC version
        id: check
        if: ${{ steps.cadence.outputs.due == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/CachyOS/linux-cachyos.git upstream
          cd upstream/linux-cachyos-rc
          export _processor_opt=generic_v2
          export _build_zfs=no
          export _build_nvidia_open=no
          export _build_r8125=no
          export _build_debug=no
          export _localmodcfg=no
          source PKGBUILD

          release_tag="cachyos-debian-aggressive-${pkgver}-${pkgrel}-x64v2"
          echo "Newest upstream RC maps to release tag: ${release_tag}"
          if gh release view "${release_tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release already exists; CNB build not required."
            echo "build=false" >> "${GITHUB_OUTPUT}"
          else
            echo "Release missing; queue CNB aggressive x64v2 build."
            echo "build=true" >> "${GITHUB_OUTPUT}"
          fi

          # GITHUB_TOKEN may lack permission to write Actions variables on some
          # repos/org policies. Cadence tracking is best-effort; the Release
          # existence check above remains the real build gate.
          if gh variable set CNB_AGGRESSIVE_V2_LAST_CHECK \
            --repo "${GITHUB_REPOSITORY}" \
            --body "$(date -u +%Y-%m-%dT%H:%M:%SZ)"; then
            echo "Updated CNB_AGGRESSIVE_V2_LAST_CHECK."
          else
            echo "::warning::Could not update CNB_AGGRESSIVE_V2_LAST_CHECK with GITHUB_TOKEN (often HTTP 403). Manual runs still work; scheduled checks may re-evaluate daily until a PAT/variable permission is available."
          fi

      - name: Skip until the next ten-day check
        if: ${{ steps.cadence.outputs.due != 'true' }}
        run: echo "Not due yet; no upstream clone or CNB build was started."

  build-on-cnb:
    needs: check-upstream
    if: ${{ needs.check-upstream.outputs.build == 'true' }}
    name: Build latest aggressive x64v2 on CNB
    uses: ./.github/workflows/build-cachyos-kernel-cnb.yml
    with:
      kernel_variant: linux-cachyos-rc
      cpu_target: generic_v2
      cpu_scheduler: upstream-default
      run_qemu_smoke_test: true
      publish_release: true
      mark_latest: false
      skip_debug_packages: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_debug_packages || true }}
    secrets: inherit
