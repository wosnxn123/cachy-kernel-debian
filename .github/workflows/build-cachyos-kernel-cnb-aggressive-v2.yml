name: Check and build aggressive x64v2 on CNB

on:
  schedule:
    # Once daily at 00:00 UTC (08:00 Asia/Shanghai).
    # Real rebuild gate is still "matching Release missing".
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      skip_debug_packages:
        description: "Skip linux-image-*-dbg packages (recommended; much smaller/faster)"
        required: true
        default: true
        type: boolean

permissions:
  actions: write
  contents: write

concurrency:
  group: cachyos-kernel-cnb-aggressive-v2
  cancel-in-progress: false

jobs:
  check-upstream:
    name: Check aggressive x64v2 release daily
    runs-on: ubuntu-24.04
    outputs:
      build: ${{ steps.check.outputs.build }}
    steps:
      - name: Check the newest CachyOS RC version
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/CachyOS/linux-cachyos.git upstream
          cd upstream/linux-cachyos-rc
          # This is a version check, so resolve the package exactly as the
          # upstream RC variant publishes it.
          unset _processor_opt _build_zfs _build_nvidia_open _build_r8125 \
            _build_debug _localmodcfg
          source PKGBUILD

          release_tag="cachyos-debian-aggressive-${pkgver}-${pkgrel}-x64v2"
          echo "Newest upstream RC maps to release tag: ${release_tag}"
          if gh release view "${release_tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release already exists; CNB build not required."
            echo "build=false" >> "${GITHUB_OUTPUT}"
          else
            echo "Release missing; queue CNB aggressive x64v2 build."
            echo "build=true" >> "${GITHUB_OUTPUT}"
          fi

          # Best-effort diagnostics only. GITHUB_TOKEN may get HTTP 403 writing
          # Actions variables; the Release existence check above is the real gate.
          if gh variable set CNB_AGGRESSIVE_V2_LAST_CHECK \
            --repo "${GITHUB_REPOSITORY}" \
            --body "$(date -u +%Y-%m-%dT%H:%M:%SZ)"; then
            echo "Updated CNB_AGGRESSIVE_V2_LAST_CHECK."
          else
            echo "::warning::Could not update CNB_AGGRESSIVE_V2_LAST_CHECK with GITHUB_TOKEN (often HTTP 403). Daily checks still run; rebuilds still depend on missing Releases."
          fi

  build-on-cnb:
    needs: check-upstream
    if: ${{ needs.check-upstream.outputs.build == 'true' }}
    name: Build latest aggressive x64v2 on CNB
    uses: ./.github/workflows/build-cachyos-kernel-cnb.yml
    with:
      kernel_variant: linux-cachyos-rc
      cpu_target: generic_v2
      cpu_scheduler: upstream-default
      run_qemu_smoke_test: true
      publish_release: true
      mark_latest: false
      skip_debug_packages: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_debug_packages || true }}
    secrets: inherit
