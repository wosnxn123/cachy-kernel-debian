name: Build CachyOS Kernel Debian Packages

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner to use for the kernel build"
        required: true
        default: "blacksmith-16vcpu-ubuntu-2404"
        type: choice
        options:
          - blacksmith-8vcpu-ubuntu-2404
          - blacksmith-16vcpu-ubuntu-2404
          - blacksmith-32vcpu-ubuntu-2404
          - ubuntu-24.04
      run_qemu_smoke_test:
        description: "Boot the built kernel with a tiny initramfs under QEMU"
        required: true
        default: true
        type: boolean
      publish_release:
        description: "Create/update a GitHub Release and upload the .deb files"
        required: true
        default: false
        type: boolean
      release_tag:
        description: "Release tag to create/update. Leave blank to auto-generate one."
        required: false
        default: ""
        type: string
      mark_latest:
        description: "Mark the created/updated release as the latest release"
        required: true
        default: true
        type: boolean
  schedule:
    - cron: "0 22 * * *"

permissions:
  contents: write

concurrency:
  group: cachyos-kernel-${{ github.ref }}
  cancel-in-progress: false

env:
  DEBIAN_FRONTEND: noninteractive
  RUN_QEMU_SMOKE_TEST: ${{ inputs.run_qemu_smoke_test || github.event_name == 'schedule' || false }}

jobs:
  check-upstream:
    name: Check stable and RC CachyOS versions
    runs-on: ubuntu-24.04
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Check upstream package version
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail

          if [ "${GITHUB_EVENT_NAME}" != "schedule" ]; then
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git clone --depth=1 https://github.com/CachyOS/linux-cachyos.git upstream
          changed=false
          for variant in linux-cachyos-server linux-cachyos-rc; do
            cd "${GITHUB_WORKSPACE}/upstream/${variant}"
            if [ "${variant}" = "linux-cachyos-server" ]; then
              export _cpusched=eevdf
              export _cachy_config=no
              export _HZ_ticks=300
              export _tickrate=full
              export _preempt=lazy
              export _hugepage=always
            else
              export _cpusched=cachyos
              export _cachy_config=yes
              export _HZ_ticks=1000
              export _tickrate=full
              export _preempt=full
              export _hugepage=always
            fi
            export _processor_opt=generic_v2
            export _use_llvm_lto=none
            export _use_gcc_suffix=no
            export _build_zfs=no
            export _build_nvidia_open=no
            export _build_r8125=no
            export _build_debug=no
            export _localmodcfg=no
            source PKGBUILD

            for cpu_level in 1 2 3; do
              release_tag="cachyos-debian-$([ "${variant}" = "linux-cachyos-rc" ] && echo aggressive || echo stable)-${pkgver}-${pkgrel}-x64v${cpu_level}"
              if gh release view "${release_tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
                echo "${release_tag} already exists."
              else
                echo "${release_tag} is new."
                changed=true
              fi
            done
            unset pkgbase pkgver pkgrel _srcname _major _minor _tagrel _cpusched
          done
          echo "changed=${changed}" >> "${GITHUB_OUTPUT}"

  build:
    needs: check-upstream
    if: ${{ needs.check-upstream.outputs.changed == 'true' }}
    name: Build, package, and test (${{ matrix.track }} x64v${{ matrix.cpu_level }})
    strategy:
      fail-fast: false
      matrix:
        track: [stable, aggressive]
        cpu_target: [generic, generic_v2, generic_v3]
        include:
          - cpu_target: generic
            cpu_level: 1
          - cpu_target: generic_v2
            cpu_level: 2
          - cpu_target: generic_v3
            cpu_level: 3
    runs-on: ${{ inputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 720
    env:
      KERNEL_VARIANT: ${{ matrix.track == 'aggressive' && 'linux-cachyos-rc' || 'linux-cachyos-server' }}
      CPU_SCHEDULER: ${{ matrix.track == 'aggressive' && 'cachyos' || 'eevdf' }}
      CPU_TARGET: ${{ matrix.cpu_target }}
      CPU_LEVEL: ${{ matrix.cpu_level }}
      BUILD_PROFILE: ${{ matrix.track }}
      BUILD_TRACK: ${{ matrix.track }}

    steps:
      - name: Check out workflow repository
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          set -euxo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Install build and test dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc \
            bindgen \
            bison \
            build-essential \
            busybox-static \
            ca-certificates \
            clang \
            cpio \
            curl \
            debhelper \
            dwarves \
            fakeroot \
            flex \
            git \
            kmod \
            libdw-dev \
            libelf-dev \
            libssl-dev \
            lintian \
            lld \
            llvm \
            pahole \
            perl \
            python3 \
            qemu-system-x86 \
            rsync \
            rustc \
            xz-utils \
            zstd

      - name: Fetch newest CachyOS kernel metadata and source
        id: cachyos
        run: |
          set -euxo pipefail
          mkdir -p build
          git clone --depth=1 https://github.com/CachyOS/linux-cachyos.git build/linux-cachyos-packaging

          cd "build/linux-cachyos-packaging/${KERNEL_VARIANT}"
          export _cpusched="${CPU_SCHEDULER}"
          export _processor_opt="${CPU_TARGET}"
          export _use_llvm_lto=none
          export _use_gcc_suffix=no
          export _build_zfs=no
          export _build_nvidia_open=no
          export _build_r8125=no
          export _build_debug=no
          export _localmodcfg=no
          if [ "${BUILD_PROFILE}" = "aggressive" ]; then
            export _cachy_config=yes
            export _HZ_ticks=1000
            export _tickrate=full
            export _preempt=full
            export _hugepage=always
          else
            export _cachy_config=no
            export _HZ_ticks=300
            export _tickrate=full
            export _preempt=lazy
            export _hugepage=always
          fi

          source PKGBUILD

          {
            echo "pkgbase=${pkgbase}"
            echo "pkgver=${pkgver}"
            echo "pkgrel=${pkgrel}"
            echo "srcname=${_srcname}"
            echo "source_url=https://github.com/CachyOS/linux/releases/download/${_srcname}/${_srcname}.tar.gz"
          } >> "${GITHUB_OUTPUT}"

          cd "${GITHUB_WORKSPACE}/build"
          curl --fail --location --retry 5 --retry-delay 10 \
            --output "${_srcname}.tar.gz" \
            "https://github.com/CachyOS/linux/releases/download/${_srcname}/${_srcname}.tar.gz"
          tar -xf "${_srcname}.tar.gz"
          cp "linux-cachyos-packaging/${KERNEL_VARIANT}/config" "${_srcname}/.config"
          echo "source_dir=${GITHUB_WORKSPACE}/build/${_srcname}" >> "${GITHUB_OUTPUT}"

      - name: Configure kernel profile and CPU baseline
        working-directory: ${{ steps.cachyos.outputs.source_dir }}
        run: |
          set -euxo pipefail

          cfg() {
            scripts/config "$@" || true
          }

          cfg --set-str LOCALVERSION "-x64v${CPU_LEVEL}-cachyos-${BUILD_PROFILE}"
          cfg --set-str SYSTEM_TRUSTED_KEYS ""
          cfg --set-str SYSTEM_REVOCATION_KEYS ""
          cfg -d DEBUG_INFO
          cfg -d DEBUG_INFO_DWARF_TOOLCHAIN_DEFAULT
          cfg -d DEBUG_INFO_BTF
          cfg -e MODULES
          cfg -e MODULE_UNLOAD
          cfg -e KALLSYMS
          cfg -e KALLSYMS_ALL
          cfg -e IKCONFIG
          cfg -e IKCONFIG_PROC
          if [ "${BUILD_PROFILE}" = "aggressive" ]; then
            cfg -e CACHY
          else
            cfg -d CACHY
          fi
          cfg -e GENERIC_CPU
          for cpu_opt in \
            GENERIC_CPU3 GENERIC_CPU4 MNATIVE MIVYBRIDGE MPSC MATOM MCORE2 \
            MNEHALEM MWESTMERE MSILVERMONT MGOLDMONT MGOLDMONTPLUS MSKYLAKE \
            MSKYLAKEX MCANNONLAKE MICELAKE MCASCADELAKE MCOOPERLAKE \
            MTIGERLAKE MSAPPHIRERAPIDS MROCKETLAKE MALDERLAKE MRAPTORLAKE \
            MMETEORLAKE MEMERALDRAPIDS MZEN MZEN2 MZEN3 MZEN4 MZEN5; do
            cfg -d "${cpu_opt}"
          done
          case "${CPU_TARGET}" in
            generic) cfg --set-val X86_64_VERSION 1 ;;
            generic_v2) cfg --set-val X86_64_VERSION 2 ;;
            generic_v3) cfg --set-val X86_64_VERSION 3 ;;
            *) echo "Unsupported CPU target: ${CPU_TARGET}" >&2; exit 1 ;;
          esac
          cfg -e PREEMPT_DYNAMIC
          if [ "${BUILD_PROFILE}" = "aggressive" ]; then
            cfg -e HZ_1000 --set-val HZ 1000
            cfg -e PREEMPT -d PREEMPT_LAZY
            cfg -d NO_HZ_IDLE -d CONTEXT_TRACKING_FORCE
            cfg -e NO_HZ_FULL_NODEF -e NO_HZ_FULL -e NO_HZ -e NO_HZ_COMMON -e CONTEXT_TRACKING
            cfg -d TRANSPARENT_HUGEPAGE_MADVISE -e TRANSPARENT_HUGEPAGE_ALWAYS
          else
            cfg -e HZ_300 --set-val HZ 300
            cfg -d PREEMPT -e PREEMPT_LAZY
            cfg -d NO_HZ_IDLE -d CONTEXT_TRACKING_FORCE
            cfg -e NO_HZ_FULL_NODEF -e NO_HZ_FULL -e NO_HZ -e NO_HZ_COMMON -e CONTEXT_TRACKING
            cfg -d TRANSPARENT_HUGEPAGE_MADVISE -e TRANSPARENT_HUGEPAGE_ALWAYS
          fi
          cfg -e HIGH_RES_TIMERS
          cfg -e CPU_FREQ
          cfg -e CPU_FREQ_GOV_SCHEDUTIL
          cfg -e CPU_FREQ_DEFAULT_GOV_SCHEDUTIL
          cfg -e X86_AMD_PSTATE
          cfg -e ACPI
          cfg -e EFI
          cfg -e EFI_STUB
          cfg -e EFI_PARTITION

          cfg -e BLK_DEV_INITRD
          cfg -e BINFMT_ELF
          cfg -e BINFMT_SCRIPT
          cfg -e DEVTMPFS
          cfg -e DEVTMPFS_MOUNT
          cfg -e PRINTK
          cfg -e EARLY_PRINTK
          cfg -e TTY
          cfg -e SERIAL_8250
          cfg -e SERIAL_8250_CONSOLE
          cfg -e SERIAL_8250_PCI
          cfg -e SERIAL_EARLYCON
          cfg -e SERIAL_CORE
          cfg -e SERIAL_CORE_CONSOLE
          cfg -e RD_GZIP
          cfg -e RD_ZSTD
          cfg -e RD_XZ
          cfg -e TMPFS
          cfg -e CGROUPS
          cfg -e CGROUP_BPF
          cfg -e PSI
          cfg -e BPF
          cfg -e BPF_SYSCALL
          cfg -e BPF_JIT

          cfg -e NET
          cfg -e INET
          cfg -m TCP_CONG_BBR
          cfg -m NET_SCH_FQ
          cfg -m NETFILTER
          cfg -m NF_TABLES
          cfg -m BRIDGE
          cfg -m VLAN_8021Q
          cfg -m WIREGUARD

          cfg -e INPUT
          cfg -e INPUT_EVDEV
          cfg -e HID
          cfg -m HID_GENERIC
          cfg -m HID_MULTITOUCH
          cfg -m I2C_HID_ACPI
          cfg -m USB_HID
          cfg -m USB_XHCI_HCD
          cfg -m USB_STORAGE
          cfg -m UVC_VIDEO
          cfg -m SND_HDA_INTEL
          cfg -m SND_USB_AUDIO

          cfg -e DRM
          cfg -m DRM_AMDGPU
          cfg -m DRM_I915
          cfg -m DRM_NOUVEAU
          cfg -m DRM_VIRTIO_GPU
          cfg -m FB_EFI
          cfg -m FRAMEBUFFER_CONSOLE

          cfg -m BT
          cfg -m BT_HCIBTUSB
          cfg -m WLAN
          cfg -m CFG80211
          cfg -m MAC80211
          cfg -m IWLWIFI
          cfg -m IWLWIFI_OPMODE_MODULAR
          cfg -m ATH10K
          cfg -m ATH11K
          cfg -m RTW88
          cfg -m RTW89
          cfg -m MT76

          cfg -m EXT4_FS
          cfg -m BTRFS_FS
          cfg -m XFS_FS
          cfg -m F2FS_FS
          cfg -m EXFAT_FS
          cfg -m NTFS3_FS
          cfg -m NFS_FS
          cfg -m CIFS
          cfg -m OVERLAY_FS
          cfg -m SQUASHFS
          cfg -m ZRAM
          cfg -m ZSWAP

          cfg -m KVM
          cfg -m KVM_INTEL
          cfg -m KVM_AMD
          cfg -m VFIO
          cfg -m VFIO_PCI
          cfg -m VIRTIO
          cfg -m VIRTIO_PCI
          cfg -m VIRTIO_BLK
          cfg -m VIRTIO_NET
          cfg -m VIRTIO_CONSOLE

          make olddefconfig
          grep -E 'CONFIG_(GENERIC_CPU|GENERIC_CPU[234]|X86_64_VERSION|BLK_DEV_INITRD|RD_GZIP|SERIAL_8250_CONSOLE)=' .config || true
          scripts/config --state MODULES PREEMPT_DYNAMIC DRM_AMDGPU DRM_I915 EXT4_FS BTRFS_FS KVM VFIO_PCI SERIAL_8250_CONSOLE BLK_DEV_INITRD || true
          for required_config in \
            CONFIG_GENERIC_CPU=y \
            CONFIG_X86_64_VERSION=${CPU_LEVEL} \
            CONFIG_BLK_DEV_INITRD=y \
            CONFIG_BINFMT_ELF=y \
            CONFIG_BINFMT_SCRIPT=y \
            CONFIG_PRINTK=y \
            CONFIG_SERIAL_8250=y \
            CONFIG_SERIAL_8250_CONSOLE=y; do
            grep -qx "${required_config}" .config
          done

      - name: Compile kernel and create Debian packages
        working-directory: ${{ steps.cachyos.outputs.source_dir }}
        run: |
          set -euxo pipefail
          export KBUILD_BUILD_USER="github-actions"
          export KBUILD_BUILD_HOST="users.noreply.github.com"
          export KDEB_PKGVERSION="${{ steps.cachyos.outputs.pkgver }}-${{ github.run_number }}"
          export KDEB_COMPRESS=xz
          fakeroot make -j"$(nproc)" bindeb-pkg

          mkdir -p "${GITHUB_WORKSPACE}/artifacts"
          mv ../*.deb "${GITHUB_WORKSPACE}/artifacts/"
          ls -lh "${GITHUB_WORKSPACE}/artifacts"

      - name: Validate Debian packages
        run: |
          set -euxo pipefail
          shopt -s nullglob
          debs=(artifacts/*.deb)
          test "${#debs[@]}" -gt 0
          mapfile -t image_debs < <(find artifacts -maxdepth 1 -type f -name 'linux-image-*.deb' ! -name '*-dbg_*' ! -name '*-dbg-*.deb' | sort -V)
          header_debs=(artifacts/linux-headers-*.deb)
          test "${#image_debs[@]}" -gt 0
          test "${#header_debs[@]}" -gt 0

          for deb in "${debs[@]}"; do
            dpkg-deb --info "$deb"
            dpkg-deb --contents "$deb" > "${deb}.contents.txt"
            lintian \
              --fail-on error \
              --suppress-tags unstripped-binary-or-object \
              "$deb"
          done

          rm -rf package-check
          mkdir package-check
          dpkg-deb -x "${image_debs[0]}" package-check/image
          dpkg-deb -x "${header_debs[0]}" package-check/headers

          test -n "$(find package-check/image/boot -maxdepth 1 -type f -name 'vmlinuz-*' -print -quit)"
          test -n "$(find package-check/image/lib/modules -mindepth 1 -maxdepth 1 -type d -print -quit)"
          test -n "$(find package-check/image/lib/modules -type f \( -name '*.ko' -o -name '*.ko.xz' -o -name '*.ko.zst' -o -name 'modules.builtin' \) -print -quit)"
          test -n "$(find package-check/headers/usr/src -mindepth 1 -maxdepth 2 -type f -name Makefile -print -quit)"

      - name: QEMU boot smoke test
        if: ${{ env.RUN_QEMU_SMOKE_TEST == 'true' }}
        run: |
          set -euxo pipefail
          image_deb="$(find artifacts -maxdepth 1 -type f -name 'linux-image-*.deb' ! -name '*-dbg_*' ! -name '*-dbg-*.deb' | sort -V | head -n1)"
          rm -rf qemu-test
          mkdir -p qemu-test/root qemu-test/initramfs/{bin,dev,proc,sys}
          dpkg-deb -x "$image_deb" qemu-test/root
          kernel_image="$(find qemu-test/root/boot -maxdepth 1 -type f -name 'vmlinuz-*' | sort -V | tail -n1)"

          cp /bin/busybox qemu-test/initramfs/bin/busybox
          for applet in sh mount poweroff sleep; do
            ln -s busybox "qemu-test/initramfs/bin/${applet}"
          done
          sudo mknod -m 600 qemu-test/initramfs/dev/console c 5 1
          sudo mknod -m 666 qemu-test/initramfs/dev/null c 1 3
          cat > qemu-test/initramfs/init <<'EOF'
          #!/bin/sh
          mount -t proc proc /proc || true
          mount -t sysfs sysfs /sys || true
          mount -t devtmpfs devtmpfs /dev || true
          [ -c /dev/console ] && exec >/dev/console 2>&1
          echo CACHYOS_QEMU_BOOT_OK
          sleep 2
          poweroff -f || echo o > /proc/sysrq-trigger
          EOF
          chmod +x qemu-test/initramfs/init

          (
            cd qemu-test/initramfs
            find . -print0 | cpio --null -ov --format=newc
          ) > qemu-test/initramfs.cpio

          set +e
          rm -f qemu-test/serial.log
          timeout 180s qemu-system-x86_64 \
            -machine pc,accel=tcg \
            -cpu max \
            -m 2048M \
            -smp 2 \
            -kernel "$kernel_image" \
            -initrd qemu-test/initramfs.cpio \
            -append "rdinit=/init init=/init console=ttyS0,115200 earlycon=uart,io,0x3f8,115200n8 earlyprintk=serial,ttyS0,115200 edd=off panic=30 oops=panic" \
            -display none \
            -no-reboot \
            -monitor none \
            -serial file:qemu-test/serial.log &
          qemu_pid="$!"
          boot_ok=0
          for _ in $(seq 1 180); do
            if grep -q "CACHYOS_QEMU_BOOT_OK" qemu-test/serial.log 2>/dev/null; then
              boot_ok=1
              break
            fi
            kill -0 "$qemu_pid" 2>/dev/null || break
            sleep 1
          done
          if [ "$boot_ok" -eq 1 ] && kill -0 "$qemu_pid" 2>/dev/null; then
            kill "$qemu_pid" 2>/dev/null || true
          fi
          wait "$qemu_pid"
          qemu_status="$?"
          set -e

          cat qemu-test/serial.log
          if [ "$boot_ok" -ne 1 ]; then
            echo "QEMU boot smoke test did not reach the initramfs success marker."
            exit 1
          fi
          if [ "$qemu_status" -ne 0 ] && [ "$qemu_status" -ne 143 ]; then
            echo "QEMU exited with status ${qemu_status} after the success marker."
          fi

      - name: Write build manifest
        run: |
          set -euxo pipefail
          {
            echo "CachyOS source: ${{ steps.cachyos.outputs.source_url }}"
            echo "Source name: ${{ steps.cachyos.outputs.srcname }}"
            echo "Version: ${{ steps.cachyos.outputs.pkgver }}-${{ steps.cachyos.outputs.pkgrel }}"
            echo "Variant: ${KERNEL_VARIANT}"
            echo "Source track: ${BUILD_TRACK}"
            echo "Profile: ${BUILD_PROFILE}"
            echo "Scheduler: ${CPU_SCHEDULER}"
            echo "CPU target: ${CPU_TARGET}"
            echo "CPU baseline: x86-64-v${CPU_LEVEL}"
            echo "Kernel localversion: -x64v${CPU_LEVEL}-cachyos-${BUILD_PROFILE}"
            echo "Built at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            sha256sum artifacts/*.deb
          } > artifacts/BUILD-MANIFEST.txt

      - name: Resolve release metadata
        id: release
        if: ${{ inputs.publish_release || github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/') }}
        env:
          RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
          PKGVER: ${{ steps.cachyos.outputs.pkgver }}
          PKGREL: ${{ steps.cachyos.outputs.pkgrel }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euxo pipefail
          release_tag="${RELEASE_TAG_INPUT}"

          if [ -z "${release_tag}" ] && [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            release_tag="${GITHUB_REF_NAME}"
          fi

          if [ -z "${release_tag}" ]; then
            if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
              release_tag="cachyos-debian-${BUILD_TRACK}-${PKGVER}-${PKGREL}-x64v${CPU_LEVEL}"
            else
              release_tag="cachyos-debian-${BUILD_TRACK}-${PKGVER}-${RUN_NUMBER}-x64v${CPU_LEVEL}"
            fi
          else
            release_tag="${release_tag}-${BUILD_TRACK}-x64v${CPU_LEVEL}"
          fi

          {
            echo "tag=${release_tag}"
            echo "name=CachyOS Debian Kernel ${BUILD_TRACK} source, ${BUILD_PROFILE} profile, x86-64-v${CPU_LEVEL}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cachyos-debian-${{ matrix.track }}-x64v${{ matrix.cpu_level }}-${{ steps.cachyos.outputs.pkgver }}-${{ github.run_number }}
          path: |
            artifacts/*.deb
            artifacts/*.txt
          if-no-files-found: error
          retention-days: 14

      - name: Publish release assets
        if: ${{ steps.release.outputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release.outputs.name }}
          body_path: artifacts/BUILD-MANIFEST.txt
          files: |
            artifacts/*.deb
            artifacts/BUILD-MANIFEST.txt
          fail_on_unmatched_files: true
          generate_release_notes: true
          make_latest: ${{ matrix.track == 'stable' && matrix.cpu_level == 2 && (github.event_name == 'schedule' || inputs.mark_latest) && 'true' || 'false' }}
