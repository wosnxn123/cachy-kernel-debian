name: Build Custom CachyOS Kernel Debian Package

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner to use for the kernel build"
        required: true
        default: "blacksmith-16vcpu-ubuntu-2404"
        type: choice
        options:
          - blacksmith-8vcpu-ubuntu-2404
          - blacksmith-16vcpu-ubuntu-2404
          - blacksmith-32vcpu-ubuntu-2404
          - ubuntu-24.04
      kernel_variant:
        description: "Official CachyOS packaging variant"
        required: true
        default: "linux-cachyos"
        type: choice
        options:
          - linux-cachyos
          - linux-cachyos-server
          - linux-cachyos-rc
          - linux-cachyos-lts
          - linux-cachyos-eevdf
          - linux-cachyos-bore
          - linux-cachyos-bmq
          - linux-cachyos-hardened
          - linux-cachyos-rt-bore
          - linux-cachyos-deckify
      cpu_target:
        description: "Minimum x86-64 CPU baseline"
        required: true
        default: "generic_v2"
        type: choice
        options:
          - generic
          - generic_v2
          - generic_v3
      cpu_scheduler:
        description: "Scheduler override; upstream-default uses the selected variant's default"
        required: true
        default: "upstream-default"
        type: choice
        options:
          - upstream-default
          - cachyos
          - eevdf
          - bore
          - bmq
          - hardened
          - rt
          - rt-bore
      run_qemu_smoke_test:
        description: "Boot the built kernel with a tiny initramfs under QEMU"
        required: true
        default: true
        type: boolean
      publish_release:
        description: "Create/update a GitHub Release and upload the .deb files"
        required: true
        default: false
        type: boolean
      release_tag:
        description: "Release tag to create/update. Leave blank to auto-generate one."
        required: false
        default: ""
        type: string
      mark_latest:
        description: "Mark the created/updated release as the latest release"
        required: true
        default: false
        type: boolean
permissions:
  contents: write

concurrency:
  group: cachyos-kernel-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DEBIAN_FRONTEND: noninteractive
  RUN_QEMU_SMOKE_TEST: ${{ inputs.run_qemu_smoke_test || github.event_name == 'schedule' || false }}

jobs:
  check-upstream:
    name: Check stable and RC CachyOS versions
    runs-on: ubuntu-24.04
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Check upstream package version
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail

          if [ "${GITHUB_EVENT_NAME}" != "schedule" ]; then
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git clone --depth=1 https://github.com/CachyOS/linux-cachyos.git upstream
          changed=false
          for variant in linux-cachyos-server linux-cachyos-rc; do
            cd "${GITHUB_WORKSPACE}/upstream/${variant}"
            # Version detection must read the variant exactly as upstream
            # publishes it; no local build-option defaults are injected here.
            unset _processor_opt _build_zfs _build_nvidia_open _build_r8125 \
              _build_debug _localmodcfg _cpusched _cachy_config _HZ_ticks \
              _tickrate _preempt _hugepage
            source PKGBUILD

            for cpu_level in 1 2 3; do
              release_tag="cachyos-debian-$([ "${variant}" = "linux-cachyos-rc" ] && echo aggressive || echo stable)-${pkgver}-${pkgrel}-x64v${cpu_level}"
              if gh release view "${release_tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
                echo "${release_tag} already exists."
              else
                echo "${release_tag} is new."
                changed=true
              fi
            done
            unset pkgbase pkgver pkgrel _srcname _major _minor _tagrel \
              _cpusched _cachy_config _HZ_ticks _tickrate _preempt _hugepage
          done
          echo "changed=${changed}" >> "${GITHUB_OUTPUT}"

  build:
    needs: check-upstream
    if: ${{ needs.check-upstream.outputs.changed == 'true' }}
    name: Build, package, and test (${{ matrix.track }} x64v${{ matrix.cpu_level }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - track: custom
            profile: custom
            kernel_variant: ${{ inputs.kernel_variant }}
            cpu_scheduler: ${{ inputs.cpu_scheduler }}
            cpu_target: ${{ inputs.cpu_target }}
            cpu_level: ${{ inputs.cpu_target == 'generic' && 1 || inputs.cpu_target == 'generic_v2' && 2 || 3 }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 720
    env:
      KERNEL_VARIANT: ${{ matrix.kernel_variant }}
      REQUESTED_CPU_SCHEDULER: ${{ matrix.cpu_scheduler }}
      CPU_TARGET: ${{ matrix.cpu_target }}
      CPU_LEVEL: ${{ matrix.cpu_level }}
      BUILD_PROFILE: ${{ matrix.profile }}
      BUILD_TRACK: ${{ matrix.track }}

    steps:
      - name: Check out workflow repository
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          set -euxo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Install build and test dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc \
            bindgen \
            bison \
            bzip2 \
            build-essential \
            busybox-static \
            ca-certificates \
            clang \
            cpio \
            curl \
            debhelper \
            dwarves \
            fakeroot \
            flex \
            gettext \
            git \
            kmod \
            libdw-dev \
            libelf-dev \
            libssl-dev \
            lintian \
            lld \
            llvm \
            pahole \
            patch \
            perl \
            pkg-config \
            python3 \
            qemu-system-x86 \
            rsync \
            rustc \
            rust-src \
            xxhash \
            xz-utils \
            zlib1g-dev \
            zstd

      - name: Fetch newest CachyOS kernel metadata and source
        id: cachyos
        run: |
          set -euxo pipefail
          mkdir -p build
          git clone --depth=1 https://github.com/CachyOS/linux-cachyos.git build/linux-cachyos-packaging
          packaging_commit="$(git -C build/linux-cachyos-packaging rev-parse HEAD)"

          cd "build/linux-cachyos-packaging/${KERNEL_VARIANT}"
          if [ "${REQUESTED_CPU_SCHEDULER}" != "upstream-default" ]; then
            export _cpusched="${REQUESTED_CPU_SCHEDULER}"
          fi
          export _processor_opt="${CPU_TARGET}"
          # Preserve the PKGBUILD's live feature defaults instead of carrying
          # a repository-owned CachyOS feature list or complete .config.
          unset _build_zfs _build_nvidia_open _build_r8125 _build_debug _localmodcfg

          source PKGBUILD
          packaging_config_sha256="$(sha256sum config | awk '{print $1}')"

          # Do not silently omit an Arch-only companion package if upstream
          # starts enabling it by default; it needs a real Debian adapter.
          for companion_option in _build_zfs _build_nvidia_open _build_r8125; do
            if [ "${!companion_option:-no}" = "yes" ]; then
              echo "Upstream enabled ${companion_option}; add its Debian package adapter before building." >&2
              exit 1
            fi
          done

          for resolved_setting in \
            _cpusched _cachy_config _HZ_ticks _tickrate _preempt _hugepage \
            _use_llvm_lto _cc_harder _per_gov _tcp_bbr3 _use_kcfi; do
            test -n "${!resolved_setting:-}"
          done

          source_url=""
          for source_item in "${source[@]}"; do
            candidate_url="${source_item#*::}"
            case "${candidate_url}" in
              https://github.com/CachyOS/linux/releases/download/*.tar.gz|\
              https://github.com/CachyOS/linux/releases/download/*.tar.xz|\
              https://github.com/CachyOS/linux/releases/download/*.tar.zst)
                source_url="${candidate_url}"
                break ;;
            esac
          done
          test -n "${source_url}"

          {
            echo "CPU_SCHEDULER=${_cpusched}"
            echo "CACHY_CONFIG=${_cachy_config}"
            echo "HZ_TICKS=${_HZ_ticks}"
            echo "TICK_RATE=${_tickrate}"
            echo "PREEMPT_MODE=${_preempt}"
            echo "HUGEPAGE_MODE=${_hugepage}"
            echo "USE_LLVM_LTO=${_use_llvm_lto}"
            echo "CC_HARDER=${_cc_harder}"
            echo "PERFORMANCE_GOVERNOR=${_per_gov}"
            echo "TCP_BBR3=${_tcp_bbr3}"
            echo "USE_KCFI=${_use_kcfi}"
          } >> "${GITHUB_ENV}"

          {
            echo "pkgbase=${pkgbase}"
            echo "pkgver=${pkgver}"
            echo "pkgrel=${pkgrel}"
            echo "srcname=${_srcname}"
            echo "source_url=${source_url}"
            echo "packaging_commit=${packaging_commit}"
            echo "packaging_config_sha256=${packaging_config_sha256}"
          } >> "${GITHUB_OUTPUT}"

          cd "${GITHUB_WORKSPACE}/build"
          source_archive="${source_url##*/}"
          curl --fail --location --retry 5 --retry-delay 10 \
            --output "${source_archive}" \
            "${source_url}"
          tar -xf "${source_archive}"
          ln -s "${GITHUB_WORKSPACE}/build/linux-cachyos-packaging/${KERNEL_VARIANT}/config" config

          downloaded_patch_count=0
          downloaded_source_count=0
          for source_item in "${source[@]}"; do
            source_url_item="${source_item#*::}"
            case "${source_url_item}" in
              http://*|https://*) ;;
              git+*|git://*)
                echo "Upstream VCS source requires a Debian packaging adapter: ${source_item}" >&2
                exit 1
                ;;
              *) continue ;;
            esac

            # Mirror makepkg's source filename rule.  This fetches every
            # upstream HTTP(S) input used by prepare(), not only .patch files.
            if [[ "${source_item}" == *::* ]]; then
              source_name="${source_item%%::*}"
            else
              source_name="${source_url_item##*/}"
              source_name="${source_name%%\?*}"
              source_name="${source_name%%\#*}"
            fi
            if [ "${source_url_item}" = "${source_url}" ]; then
              continue
            fi
            mkdir -p "$(dirname "${source_name}")"
            curl --fail --location --retry 5 --retry-delay 10 \
              --output "${source_name}" \
              "${source_url_item}"
            downloaded_source_count=$((downloaded_source_count + 1))

            case "${source_name}" in
              *.patch) ;;
              *.patch.zst)
                zstd --decompress --force --output "${source_name%.zst}" "${source_name}"
                ;;
              *.patch.xz)
                xz --decompress --force --keep "${source_name}"
                ;;
              *.patch.gz)
                gzip --decompress --force --keep "${source_name}"
                ;;
              *.patch.bz2)
                bzip2 --decompress --force --keep "${source_name}"
                ;;
              *) continue ;;
            esac
            downloaded_patch_count=$((downloaded_patch_count + 1))
          done

          export srcdir="${GITHUB_WORKSPACE}/build"
          export startdir="${GITHUB_WORKSPACE}/build/linux-cachyos-packaging/${KERNEL_VARIANT}"
          export CI=""
          export GITHUB_RUN_ID=""
          set +o pipefail
          prepare
          set -o pipefail

          rm -f \
            "${_srcname}/localversion.10-pkgrel" \
            "${_srcname}/localversion.20-pkgname" \
            "${_srcname}/version"

          upstream_prelocal_config_sha256="$(sha256sum "${_srcname}/.config" | awk '{print $1}')"
          {
            echo "source_dir=${GITHUB_WORKSPACE}/build/${_srcname}"
            echo "downloaded_source_count=${downloaded_source_count}"
            echo "downloaded_patch_count=${downloaded_patch_count}"
            echo "upstream_prelocal_config_sha256=${upstream_prelocal_config_sha256}"
          } >> "${GITHUB_OUTPUT}"

      - name: Configure kernel profile and CPU baseline
        working-directory: ${{ steps.cachyos.outputs.source_dir }}
        run: |
          set -euxo pipefail

          cfg() {
            scripts/config "$@" || true
          }

          cfg --set-str LOCALVERSION "-x64v${CPU_LEVEL}-cachyos-${BUILD_PROFILE}"
          # The live CachyOS config and prepare() output are the baseline.
          # Keep only the package namespace and the explicitly selected CPU
          # baseline; debug information is suppressed for the small default
          # Debian artifact set.
          cfg -d DEBUG_INFO
          cfg -d DEBUG_INFO_DWARF_TOOLCHAIN_DEFAULT
          cfg -d DEBUG_INFO_BTF

          build_flags=()
          case "${USE_LLVM_LTO}" in
            none) ;;
            thin|thin-dist|full)
              build_flags=(CC=clang LD=ld.lld LLVM=1 LLVM_IAS=1) ;;
            *) echo "Unsupported upstream LTO mode: ${USE_LLVM_LTO}" >&2; exit 1 ;;
          esac
          make "${build_flags[@]}" olddefconfig
          for required_config in \
            CONFIG_X86_64_VERSION=${CPU_LEVEL} \
            "CONFIG_LOCALVERSION=\"-x64v${CPU_LEVEL}-cachyos-${BUILD_PROFILE}\""; do
            grep -qx "${required_config}" .config
          done
          echo "RESOLVED_CONFIG_SHA256=$(sha256sum .config | awk '{print $1}')" >> "${GITHUB_ENV}"

      - name: Compile kernel and create Debian packages
        working-directory: ${{ steps.cachyos.outputs.source_dir }}
        run: |
          set -euxo pipefail
          export KBUILD_BUILD_USER="github-actions"
          export KBUILD_BUILD_HOST="users.noreply.github.com"
          export KDEB_PKGVERSION="${{ steps.cachyos.outputs.pkgver }}-${{ github.run_number }}"
          export KDEB_COMPRESS=xz
          build_flags=()
          case "${USE_LLVM_LTO}" in
            none) ;;
            thin|thin-dist|full)
              build_flags=(CC=clang LD=ld.lld LLVM=1 LLVM_IAS=1) ;;
            *) echo "Unsupported upstream LTO mode: ${USE_LLVM_LTO}" >&2; exit 1 ;;
          esac
          fakeroot make "${build_flags[@]}" -j"$(nproc)" bindeb-pkg

          mkdir -p "${GITHUB_WORKSPACE}/artifacts"
          mv ../*.deb "${GITHUB_WORKSPACE}/artifacts/"
          ls -lh "${GITHUB_WORKSPACE}/artifacts"

      - name: Validate Debian packages
        run: |
          set -euxo pipefail
          shopt -s nullglob
          debs=(artifacts/*.deb)
          test "${#debs[@]}" -gt 0
          mapfile -t image_debs < <(find artifacts -maxdepth 1 -type f -name 'linux-image-*.deb' ! -name '*-dbg_*' ! -name '*-dbg-*.deb' | sort -V)
          header_debs=(artifacts/linux-headers-*.deb)
          test "${#image_debs[@]}" -gt 0
          test "${#header_debs[@]}" -gt 0

          for deb in "${debs[@]}"; do
            dpkg-deb --info "$deb"
            dpkg-deb --contents "$deb" > "${deb}.contents.txt"
            lintian \
              --fail-on error \
              --suppress-tags unstripped-binary-or-object \
              "$deb"
          done

          rm -rf package-check
          mkdir package-check
          dpkg-deb -x "${image_debs[0]}" package-check/image
          dpkg-deb -x "${header_debs[0]}" package-check/headers

          test -n "$(find package-check/image/boot -maxdepth 1 -type f -name 'vmlinuz-*' -print -quit)"
          test -n "$(find package-check/image/lib/modules -mindepth 1 -maxdepth 1 -type d -print -quit)"
          test -n "$(find package-check/image/lib/modules -type f \( -name '*.ko' -o -name '*.ko.xz' -o -name '*.ko.zst' -o -name 'modules.builtin' \) -print -quit)"
          test -n "$(find package-check/headers/usr/src -mindepth 1 -maxdepth 2 -type f -name Makefile -print -quit)"

      - name: QEMU boot smoke test
        if: ${{ env.RUN_QEMU_SMOKE_TEST == 'true' }}
        run: |
          set -euxo pipefail
          image_deb="$(find artifacts -maxdepth 1 -type f -name 'linux-image-*.deb' ! -name '*-dbg_*' ! -name '*-dbg-*.deb' | sort -V | head -n1)"
          rm -rf qemu-test
          mkdir -p qemu-test/root qemu-test/initramfs/{bin,dev,proc,sys}
          dpkg-deb -x "$image_deb" qemu-test/root
          kernel_image="$(find qemu-test/root/boot -maxdepth 1 -type f -name 'vmlinuz-*' | sort -V | tail -n1)"

          cp /bin/busybox qemu-test/initramfs/bin/busybox
          for applet in sh mount poweroff sleep; do
            ln -s busybox "qemu-test/initramfs/bin/${applet}"
          done
          sudo mknod -m 600 qemu-test/initramfs/dev/console c 5 1
          sudo mknod -m 666 qemu-test/initramfs/dev/null c 1 3
          cat > qemu-test/initramfs/init <<'EOF'
          #!/bin/sh
          mount -t proc proc /proc || true
          mount -t sysfs sysfs /sys || true
          mount -t devtmpfs devtmpfs /dev || true
          [ -c /dev/console ] && exec >/dev/console 2>&1
          echo CACHYOS_QEMU_BOOT_OK
          sleep 2
          poweroff -f || echo o > /proc/sysrq-trigger
          EOF
          chmod +x qemu-test/initramfs/init

          (
            cd qemu-test/initramfs
            find . -print0 | cpio --null -ov --format=newc
          ) > qemu-test/initramfs.cpio

          set +e
          rm -f qemu-test/serial.log
          timeout 180s qemu-system-x86_64 \
            -machine pc,accel=tcg \
            -cpu max \
            -m 2048M \
            -smp 2 \
            -kernel "$kernel_image" \
            -initrd qemu-test/initramfs.cpio \
            -append "rdinit=/init init=/init console=ttyS0,115200 earlycon=uart,io,0x3f8,115200n8 earlyprintk=serial,ttyS0,115200 edd=off panic=30 oops=panic" \
            -display none \
            -no-reboot \
            -monitor none \
            -serial file:qemu-test/serial.log &
          qemu_pid="$!"
          boot_ok=0
          for _ in $(seq 1 180); do
            if grep -q "CACHYOS_QEMU_BOOT_OK" qemu-test/serial.log 2>/dev/null; then
              boot_ok=1
              break
            fi
            kill -0 "$qemu_pid" 2>/dev/null || break
            sleep 1
          done
          if [ "$boot_ok" -eq 1 ] && kill -0 "$qemu_pid" 2>/dev/null; then
            kill "$qemu_pid" 2>/dev/null || true
          fi
          wait "$qemu_pid"
          qemu_status="$?"
          set -e

          cat qemu-test/serial.log
          if [ "$boot_ok" -ne 1 ]; then
            echo "QEMU boot smoke test did not reach the initramfs success marker."
            exit 1
          fi
          if [ "$qemu_status" -ne 0 ] && [ "$qemu_status" -ne 143 ]; then
            echo "QEMU exited with status ${qemu_status} after the success marker."
          fi

      - name: Write build manifest
        run: |
          set -euxo pipefail
          {
            echo "CachyOS source: ${{ steps.cachyos.outputs.source_url }}"
            echo "CachyOS packaging repository: https://github.com/CachyOS/linux-cachyos"
            echo "CachyOS packaging commit: ${{ steps.cachyos.outputs.packaging_commit }}"
            echo "CachyOS packaging config SHA256: ${{ steps.cachyos.outputs.packaging_config_sha256 }}"
            echo "CachyOS downloaded source count: ${{ steps.cachyos.outputs.downloaded_source_count }}"
            echo "CachyOS downloaded patch count: ${{ steps.cachyos.outputs.downloaded_patch_count }}"
            echo "CachyOS prepared config SHA256 (before local deltas): ${{ steps.cachyos.outputs.upstream_prelocal_config_sha256 }}"
            echo "Resolved config SHA256: ${RESOLVED_CONFIG_SHA256}"
            echo "Source name: ${{ steps.cachyos.outputs.srcname }}"
            echo "Version: ${{ steps.cachyos.outputs.pkgver }}-${{ steps.cachyos.outputs.pkgrel }}"
            echo "Variant: ${KERNEL_VARIANT}"
            echo "Source track: ${BUILD_TRACK}"
            echo "Profile: ${BUILD_PROFILE}"
            echo "Configuration flow: live CachyOS config -> live CachyOS prepare() patch queue -> olddefconfig"
            echo "Local config deltas: LOCALVERSION, x86-64 CPU baseline, and DEBUG_INFO disabled for the default small artifact set"
            echo "Scheduler: ${CPU_SCHEDULER}"
            echo "CachyOS config: ${CACHY_CONFIG}"
            echo "Timer frequency: ${HZ_TICKS} Hz"
            echo "Tick mode: ${TICK_RATE}"
            echo "Preemption: ${PREEMPT_MODE}"
            echo "Transparent hugepages: ${HUGEPAGE_MODE}"
            echo "LLVM LTO: ${USE_LLVM_LTO}"
            echo "O3 requested upstream: ${CC_HARDER}"
            echo "Performance governor requested upstream: ${PERFORMANCE_GOVERNOR}"
            echo "BBR3 requested upstream: ${TCP_BBR3}"
            echo "KCFI requested upstream: ${USE_KCFI}"
            echo "CPU target: ${CPU_TARGET}"
            echo "CPU baseline: x86-64-v${CPU_LEVEL}"
            echo "Kernel localversion: -x64v${CPU_LEVEL}-cachyos-${BUILD_PROFILE}"
            echo "Built at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            sha256sum artifacts/*.deb
          } > artifacts/BUILD-MANIFEST.txt

      - name: Resolve release metadata
        id: release
        if: ${{ inputs.publish_release || github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/') }}
        env:
          RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
          PKGVER: ${{ steps.cachyos.outputs.pkgver }}
          PKGREL: ${{ steps.cachyos.outputs.pkgrel }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euxo pipefail
          release_tag="${RELEASE_TAG_INPUT}"

          if [ -z "${release_tag}" ] && [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            release_tag="${GITHUB_REF_NAME}"
          fi

          if [ -z "${release_tag}" ]; then
            if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
              release_tag="cachyos-debian-${BUILD_TRACK}-${PKGVER}-${PKGREL}-x64v${CPU_LEVEL}"
            else
              release_tag="cachyos-debian-${BUILD_TRACK}-${PKGVER}-${RUN_NUMBER}-x64v${CPU_LEVEL}"
            fi
          else
            release_tag="${release_tag}-${BUILD_TRACK}-x64v${CPU_LEVEL}"
          fi

          {
            echo "tag=${release_tag}"
            echo "name=CachyOS Debian Kernel ${BUILD_TRACK}, ${KERNEL_VARIANT}, ${CPU_SCHEDULER}, x86-64-v${CPU_LEVEL}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cachyos-debian-${{ matrix.track }}-${{ matrix.kernel_variant }}-${{ matrix.cpu_scheduler }}-x64v${{ matrix.cpu_level }}-${{ steps.cachyos.outputs.pkgver }}-${{ github.run_number }}
          path: |
            artifacts/*.deb
            artifacts/*.txt
          if-no-files-found: error
          retention-days: 14

      - name: Publish release assets
        if: ${{ steps.release.outputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release.outputs.name }}
          body_path: artifacts/BUILD-MANIFEST.txt
          files: |
            artifacts/*.deb
            artifacts/BUILD-MANIFEST.txt
          fail_on_unmatched_files: true
          generate_release_notes: true
          make_latest: ${{ ((matrix.track == 'stable' && matrix.cpu_level == 2) || matrix.track == 'custom') && (github.event_name == 'schedule' || inputs.mark_latest) && 'true' || 'false' }}
