name: Build CachyOS Kernel on CNB

on:
  workflow_dispatch:
    inputs:
      build_set:
        description: "Kernel/CPU combinations to build on CNB"
        required: true
        default: "single"
        type: choice
        options:
          - single
          - aggressive-all
          - stable-all
          - all-six
      track:
        description: "Track used when build_set is single"
        required: true
        default: "aggressive"
        type: choice
        options:
          - aggressive
          - stable
      cpu_target:
        description: "CPU baseline used when build_set is single"
        required: true
        default: "generic_v2"
        type: choice
        options:
          - generic
          - generic_v2
          - generic_v3
      run_qemu_smoke_test:
        description: "Boot the built kernel under QEMU before publishing"
        required: true
        default: true
        type: boolean
      publish_release:
        description: "Publish .deb packages to a GitHub Release"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: cachyos-kernel-cnb-${{ github.ref }}
  cancel-in-progress: false

env:
  CNB_REPO: ${{ vars.CNB_REPO || 'Snowflake-2025/cachy-kernel-debian' }}

jobs:
  prepare-matrix:
    name: Select CNB build matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.select.outputs.matrix }}
    steps:
      - name: Select requested combinations
        id: select
        env:
          BUILD_SET: ${{ inputs.build_set }}
          SELECTED_TRACK: ${{ inputs.track }}
          SELECTED_CPU_TARGET: ${{ inputs.cpu_target }}
        run: |
          set -euo pipefail
          all='{"include":[{"track":"stable","profile":"stable","kernel_variant":"linux-cachyos-server","cpu_target":"generic","cpu_level":1},{"track":"stable","profile":"stable","kernel_variant":"linux-cachyos-server","cpu_target":"generic_v2","cpu_level":2},{"track":"stable","profile":"stable","kernel_variant":"linux-cachyos-server","cpu_target":"generic_v3","cpu_level":3},{"track":"aggressive","profile":"aggressive","kernel_variant":"linux-cachyos-rc","cpu_target":"generic","cpu_level":1},{"track":"aggressive","profile":"aggressive","kernel_variant":"linux-cachyos-rc","cpu_target":"generic_v2","cpu_level":2},{"track":"aggressive","profile":"aggressive","kernel_variant":"linux-cachyos-rc","cpu_target":"generic_v3","cpu_level":3}]}'
          case "${BUILD_SET}" in
            single)
              matrix="$(jq -c --arg track "${SELECTED_TRACK}" --arg cpu "${SELECTED_CPU_TARGET}" \
                '{include: [.include[] | select(.track == $track and .cpu_target == $cpu)]}' <<<"${all}")"
              ;;
            aggressive-all)
              matrix="$(jq -c '{include: [.include[] | select(.track == "aggressive")]}' <<<"${all}")"
              ;;
            stable-all)
              matrix="$(jq -c '{include: [.include[] | select(.track == "stable")]}' <<<"${all}")"
              ;;
            all-six) matrix="${all}" ;;
            *) echo "Unknown build set: ${BUILD_SET}" >&2; exit 1 ;;
          esac
          test "$(jq '.include | length' <<<"${matrix}")" -gt 0
          echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"

  sync-cnb:
    name: Sync source commit to CNB
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require CNB access token
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          if [ -z "${CNB_TOKEN}" ]; then
            echo "Repository secret CNB_TOKEN is not configured." >&2
            exit 1
          fi

      - name: Push the exact GitHub commit to CNB
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          set -euo pipefail
          basic_auth="$(printf 'cnb:%s' "${CNB_TOKEN}" | base64 -w 0)"
          git -c "http.extraHeader=Authorization: Basic ${basic_auth}" \
            push "https://cnb.cool/${CNB_REPO}" \
            "${GITHUB_SHA}:refs/heads/main"

  dispatch:
    needs:
      - prepare-matrix
      - sync-cnb
    name: CNB ${{ matrix.track }} x64v${{ matrix.cpu_level }}
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - name: Require CNB access token
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          if [ -z "${CNB_TOKEN}" ]; then
            echo "Repository secret CNB_TOKEN is not configured." >&2
            exit 1
          fi

      - name: Trigger CNB Cloud Native Build
        id: trigger
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
          GH_JOB_TOKEN: ${{ github.token }}
          RUN_QEMU_SMOKE_TEST: ${{ inputs.run_qemu_smoke_test }}
          PUBLISH_RELEASE: ${{ inputs.publish_release }}
          MARK_LATEST: ${{ matrix.track == 'stable' && matrix.cpu_level == 2 }}
        run: |
          set -euo pipefail
          payload="$(jq -n \
            --arg branch "main" \
            --arg event "api_trigger_kernel" \
            --arg sha "${GITHUB_SHA}" \
            --arg title "GitHub #${GITHUB_RUN_NUMBER}: ${{ matrix.track }} x64v${{ matrix.cpu_level }}" \
            --arg kernel_variant "${{ matrix.kernel_variant }}" \
            --arg cpu_target "${{ matrix.cpu_target }}" \
            --arg cpu_level "${{ matrix.cpu_level }}" \
            --arg profile "${{ matrix.profile }}" \
            --arg track "${{ matrix.track }}" \
            --arg qemu "${RUN_QEMU_SMOKE_TEST}" \
            --arg publish "${PUBLISH_RELEASE}" \
            --arg latest "${MARK_LATEST}" \
            --arg github_repository "${GITHUB_REPOSITORY}" \
            --arg github_sha "${GITHUB_SHA}" \
            --arg github_run_number "${GITHUB_RUN_NUMBER}" \
            --arg github_run_id "${GITHUB_RUN_ID}" \
            --arg gh_token "${GH_JOB_TOKEN}" \
            '{
              branch: $branch,
              event: $event,
              sha: $sha,
              sync: "false",
              title: $title,
              env: {
                KERNEL_VARIANT: $kernel_variant,
                REQUESTED_CPU_SCHEDULER: "upstream-default",
                CPU_TARGET: $cpu_target,
                CPU_LEVEL: $cpu_level,
                BUILD_PROFILE: $profile,
                BUILD_TRACK: $track,
                RUN_QEMU_SMOKE_TEST: $qemu,
                PUBLISH_RELEASE: $publish,
                MARK_LATEST: $latest,
                GITHUB_REPOSITORY: $github_repository,
                GITHUB_SHA: $github_sha,
                GITHUB_RUN_NUMBER: $github_run_number,
                GITHUB_RUN_ID: $github_run_id,
                GH_TOKEN: $gh_token
              }
            }')"

          response_file="$(mktemp)"
          http_code="$(curl --silent --show-error \
            --output "${response_file}" --write-out '%{http_code}' \
            --request POST \
            --url "https://api.cnb.cool/${CNB_REPO}/-/build/start" \
            --header 'Accept: application/vnd.cnb.api+json' \
            --header "Authorization: Bearer ${CNB_TOKEN}" \
            --header 'Content-Type: application/json' \
            --data-binary "${payload}")"
          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            jq 'del(.token, .env, .authorization)' "${response_file}" || cat "${response_file}"
            exit 1
          fi
          jq -e '.success == true and (.sn | length > 0)' "${response_file}" >/dev/null
          sn="$(jq -r '.sn' "${response_file}")"
          log_url="$(jq -r '.buildLogUrl' "${response_file}")"
          echo "sn=${sn}" >> "${GITHUB_OUTPUT}"
          echo "log_url=${log_url}" >> "${GITHUB_OUTPUT}"
          {
            echo "### CNB build dispatched"
            echo
            echo "- Build: [${sn}](${log_url})"
            echo "- Target: ${{ matrix.track }} / x86-64-v${{ matrix.cpu_level }}"
            echo "- CNB runner: 32 vCPU amd64"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Wait for CNB build
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
          CNB_SN: ${{ steps.trigger.outputs.sn }}
          CNB_LOG_URL: ${{ steps.trigger.outputs.log_url }}
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 21000))
          while [ "${SECONDS}" -lt "${deadline}" ]; do
            response="$(curl --fail-with-body --silent --show-error \
              --url "https://api.cnb.cool/${CNB_REPO}/-/build/status/${CNB_SN}" \
              --header 'Accept: application/vnd.cnb.api+json' \
              --header "Authorization: Bearer ${CNB_TOKEN}")"
            status="$(jq -r '.status // "unknown"' <<<"${response}")"
            printf 'CNB %s status: %s\n' "${CNB_SN}" "${status}"
            case "${status,,}" in
              success|succeeded|passed|pass|通过)
                {
                  echo
                  echo "CNB result: **${status}**"
                  echo "GitHub packages: https://github.com/${GITHUB_REPOSITORY}/releases"
                } >> "${GITHUB_STEP_SUMMARY}"
                exit 0
                ;;
              failure|failed|error|errored|cancelled|canceled|timeout|timed_out|失败|取消|超时)
                echo "CNB build failed with status ${status}: ${CNB_LOG_URL}" >&2
                exit 1
                ;;
            esac
            sleep 30
          done
          echo "Timed out waiting for CNB build: ${CNB_LOG_URL}" >&2
          exit 1
